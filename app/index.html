<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pyme Ledger AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d3d;
  --border:#2a3347;--border2:#3a4560;
  --accent:#6c63ff;--accent2:#8b85ff;--accent3:#4f46e5;
  --green:#22c55e;--green2:#16a34a;
  --yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --radius:12px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --glow:0 0 20px rgba(108,99,255,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:230px;min-width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent3),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--glow);flex-shrink:0}
.logo-text{font-weight:800;font-size:14px}
.logo-sub{font-size:10px;color:var(--text3)}
.sidebar-emp{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.sidebar-emp:hover{background:var(--bg3)}
.emp-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.emp-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-rut{font-size:11px;color:var(--text2)}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-sec{padding:10px 14px 3px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;transition:all .12s;color:var(--text2);font-size:13px;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(108,99,255,.12);color:var(--accent2);border-left-color:var(--accent)}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;padding:2px 5px;border-radius:10px;font-weight:700}
.sidebar-foot{padding:10px 14px;border-top:1px solid var(--border)}
.model-pill{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--bg3);border-radius:var(--radius-sm);font-size:11px}
.model-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.model-dot.online{background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Main */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;flex:1}
.topbar-sub{font-size:11px;color:var(--text3)}
.content{flex:1;overflow-y:auto;padding:22px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.card-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:20px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:border-color .15s}
.kpi-card:hover{border-color:var(--border2)}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.kpi-value{font-size:20px;font-weight:800;margin-bottom:3px}
.kpi-sub{font-size:10px;color:var(--text3)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;transition:all .12s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);box-shadow:var(--glow)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border2)}
.btn-success{background:var(--green2);color:#fff}
.btn-success:hover{background:var(--green)}
.btn-danger{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-lg{padding:11px 22px;font-size:13px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Upload */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:44px 20px;text-align:center;transition:all .2s;cursor:pointer;background:var(--bg3);position:relative}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(108,99,255,.06)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:44px;margin-bottom:10px;opacity:.5}
.upload-title{font-size:15px;font-weight:700;margin-bottom:5px}
.upload-sub{font-size:12px;color:var(--text3)}

/* ═══════════════════════════════════════════════════════
   PIPELINE AGÉNTICO — Diseño moderno
═══════════════════════════════════════════════════════ */
.pipeline-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:18px}
.pipeline-head{
  padding:14px 18px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,rgba(108,99,255,.12),rgba(79,70,229,.04));
  display:flex;align-items:center;gap:10px;
}
.pipeline-head .ph-icon{font-size:22px}
.pipeline-head .ph-info{flex:1}
.pipeline-head .ph-title{font-size:14px;font-weight:700}
.pipeline-head .ph-file{font-size:11px;color:var(--text3);margin-top:1px}
.pipeline-head .ph-status{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:rgba(108,99,255,.15);color:var(--accent2)}
.pipeline-head .ph-status.done{background:rgba(34,197,94,.15);color:var(--green)}
.pipeline-head .ph-status.error{background:rgba(239,68,68,.15);color:var(--red)}

.pipeline-steps{padding:0}
.p-step{display:flex;gap:0;border-bottom:1px solid var(--border);transition:background .15s}
.p-step:last-child{border-bottom:none}
.p-step:hover{background:rgba(255,255,255,.02)}
.p-step-left{width:56px;display:flex;flex-direction:column;align-items:center;padding:14px 0;flex-shrink:0}
.p-step-num{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;flex-shrink:0;
  transition:all .3s;
  border:2px solid var(--border);background:var(--bg3);color:var(--text3);
}
.p-step-num.waiting{border-color:var(--border);background:var(--bg3);color:var(--text3)}
.p-step-num.running{
  border-color:var(--accent);background:rgba(108,99,255,.15);color:var(--accent2);
  box-shadow:0 0 0 4px rgba(108,99,255,.15);
  animation:step-pulse 1.2s ease-in-out infinite;
}
@keyframes step-pulse{0%,100%{box-shadow:0 0 0 0 rgba(108,99,255,.4)}50%{box-shadow:0 0 0 8px rgba(108,99,255,0)}}
.p-step-num.done{border-color:var(--green);background:rgba(34,197,94,.12);color:var(--green)}
.p-step-num.error{border-color:var(--red);background:rgba(239,68,68,.12);color:var(--red)}
.p-step-num.skip{border-color:var(--text3);background:var(--bg3);color:var(--text3);opacity:.5}
.p-step-line{width:2px;flex:1;background:var(--border);margin-top:4px;min-height:10px}
.p-step-line.done{background:var(--green)}

.p-step-right{flex:1;padding:12px 16px 12px 0}
.p-step-name{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.p-step-msg{font-size:12px;color:var(--text2);line-height:1.5}
.p-step-msg.running{color:var(--accent2)}
.p-step-msg.done{color:var(--green)}
.p-step-msg.error{color:var(--red)}
.p-step-msg.skip{color:var(--text3)}

.p-step-data{margin-top:8px}
.p-step-fields{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.p-field{background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px}
.p-field .pk{color:var(--text3);margin-right:3px}
.p-field .pv{color:var(--accent2);font-weight:700}
.p-step-preview{
  margin-top:8px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px;
  font-size:11px;color:var(--text2);line-height:1.6;
}
.p-step-preview pre{white-space:pre-wrap;word-break:break-word;font-family:'Courier New',monospace;font-size:10px;max-height:120px;overflow-y:auto}
.p-cat-suggest{
  margin-top:8px;background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.25);
  border-radius:var(--radius-sm);padding:10px;
}
.p-cat-name{font-size:14px;font-weight:700;color:var(--accent2)}
.p-cat-reason{font-size:11px;color:var(--text3);margin-top:2px}
.p-conf-bar{height:4px;background:var(--bg4);border-radius:2px;margin-top:6px;overflow:hidden}
.p-conf-fill{height:100%;border-radius:2px;transition:width .6s ease}
.p-conf-fill.high{background:var(--green)}
.p-conf-fill.med{background:var(--yellow)}
.p-conf-fill.low{background:var(--red)}
.p-conf-label{text-align:right;font-size:10px;color:var(--text3);margin-top:2px}

/* Result Panel */
.result-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:18px}
.result-head{
  padding:14px 18px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(22,163,74,.03));
  display:flex;align-items:center;gap:10px;
}
.result-body{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.r-field{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.r-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.r-value{font-size:13px;font-weight:700}
.r-value.empty{color:var(--text3);font-weight:400;font-style:italic;font-size:12px}
.result-cat{padding:14px 18px;border-top:1px solid var(--border)}
.result-actions{padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cat-row{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
.cat-row label{font-size:12px;color:var(--text2);white-space:nowrap}
.cat-row select{flex:1;min-width:160px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:var(--radius-sm);font-size:12px}

/* Doc Grid */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.doc-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .15s}
.doc-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.doc-thumb{height:130px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.doc-thumb img{width:100%;height:100%;object-fit:cover}
.doc-thumb .dt-icon{font-size:36px;opacity:.35}
.doc-status{position:absolute;top:7px;right:7px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700}
.doc-info{padding:10px}
.doc-prov{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:10px;color:var(--text3);margin-top:2px}
.doc-amount{font-size:14px;font-weight:800;color:var(--accent2);margin-top:5px}
.doc-cat{display:inline-block;margin-top:5px;background:rgba(108,99,255,.12);color:var(--accent2);font-size:9px;padding:2px 7px;border-radius:20px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.badge-pendiente{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge-revisado{background:rgba(34,197,94,.15);color:var(--green)}
.badge-rechazado{background:rgba(239,68,68,.15);color:var(--red)}
.badge-processing{background:rgba(108,99,255,.15);color:var(--accent2)}

/* Filters */
.filters-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filters-bar input{flex:1;min-width:180px;max-width:280px;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:var(--radius-sm);font-size:12px}
.filters-bar input:focus{border-color:var(--accent)}
.filter-tabs{display:flex;gap:3px}
.filter-tab{padding:5px 11px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .12s}
.filter-tab.active{background:rgba(108,99,255,.15);color:var(--accent2);border-color:var(--accent)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:min(840px,95vw);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;transform:scale(.95);transition:transform .2s}
.modal-overlay.open .modal{transform:scale(1)}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-title{font-size:14px;font-weight:700;flex:1}
.modal-close{width:26px;height:26px;border-radius:6px;background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .12s}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-body{padding:18px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* Doc Detail */
.doc-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.doc-preview{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:280px}
.doc-preview img{max-width:100%;max-height:380px;object-fit:contain}
.no-preview{text-align:center;padding:28px;color:var(--text3)}
.no-preview .np-icon{font-size:44px;margin-bottom:10px}
.doc-fields{display:flex;flex-direction:column;gap:8px}
.dfr{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px}
.dfr-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.dfr-value{font-size:13px;font-weight:700}
.dfr-value.empty{color:var(--text3);font-weight:400;font-style:italic}
.ocr-panel{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px}
.ocr-title{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.ocr-panel pre{font-size:10px;color:var(--text2);white-space:pre-wrap;word-break:break-word;max-height:180px;overflow-y:auto;line-height:1.6;font-family:monospace}

/* Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:600}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:var(--radius-sm);font-size:13px;transition:border-color .12s}
.form-input:focus{border-color:var(--accent)}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:var(--radius-sm);font-size:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Onboarding */
.onboarding{max-width:520px;margin:50px auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.ob-header{padding:28px;text-align:center;background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(79,70,229,.04));border-bottom:1px solid var(--border)}
.ob-icon{font-size:52px;margin-bottom:10px}
.ob-title{font-size:20px;font-weight:800;margin-bottom:6px}
.ob-sub{font-size:13px;color:var(--text2);line-height:1.6}
.ob-body{padding:24px}
.ob-step{display:none;animation:fadeIn .25s ease}
.ob-step.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ob-dots{display:flex;gap:5px;justify-content:center;margin-bottom:20px}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all .2s}
.ob-dot.active{background:var(--accent);transform:scale(1.3)}
.ob-dot.done{background:var(--green)}
.ob-counter{font-size:10px;color:var(--text3);text-align:center;margin-bottom:14px}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.chart-card canvas{max-height:220px}

/* Empty State */
.empty-state{text-align:center;padding:50px 20px}
.es-icon{font-size:50px;margin-bottom:14px;opacity:.35}
.es-title{font-size:15px;font-weight:700;margin-bottom:6px}
.es-sub{font-size:12px;color:var(--text3);margin-bottom:18px;line-height:1.6}

/* Toast */
.toast-container{position:fixed;top:18px;right:18px;z-index:2000;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;display:flex;align-items:center;gap:8px;min-width:260px;box-shadow:var(--shadow);animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{background:#14532d;border:1px solid var(--green2);color:#bbf7d0}
.toast.error{background:#7f1d1d;border:1px solid #991b1b;color:#fca5a5}
.toast.info{background:#1e3a5f;border:1px solid var(--blue);color:#bfdbfe}

/* Spinner */
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .sidebar{width:0;min-width:0;overflow:hidden}
  .form-row{grid-template-columns:1fr}
  .doc-detail-grid{grid-template-columns:1fr}
  .charts-grid{grid-template-columns:1fr}
  .result-body{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">📒</div>
      <div><div class="logo-text">Ledger AI</div><div class="logo-sub">Contabilidad con IA</div></div>
    </div>
    <div class="sidebar-emp" onclick="showSection('admin')">
      <div class="emp-label">Empresa activa</div>
      <div class="emp-name" id="sidebarEmpName">Sin empresa</div>
      <div class="emp-rut" id="sidebarEmpRut">—</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-sec">Principal</div>
      <div class="nav-item active" data-s="dashboard" onclick="showSection('dashboard')"><span class="nav-icon">📊</span>Dashboard</div>
      <div class="nav-item" data-s="nuevo-gasto" onclick="showSection('nuevo-gasto')"><span class="nav-icon">➕</span>Nuevo Gasto</div>
      <div class="nav-item" data-s="documentos" onclick="showSection('documentos')">
        <span class="nav-icon">📁</span>Documentos
        <span class="nav-badge" id="pendingBadge">0</span>
      </div>
      <div class="nav-sec">Análisis</div>

        <div class="model-dot" id="modelDot"></div>

  <!-- Main -->

<!-- Modal Documento -->
<div class="modal-overlay" id="docModal">

    <div class="modal-body" id="docModalBody"></div>
    <div class="modal-footer" id="docModalFooter"></div>

</div>

<!-- Modal Nueva Empresa -->
<div class="modal-overlay" id="empresaModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header"><div class="modal-title">🏢 Nueva Empresa</div><div class="modal-close" onclick="closeModal('empresaModal')">✕</div></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Razón Social *</label><input class="form-input" id="empRazonSocial" placeholder="Ej: Mi Empresa SpA"/></div>

            <option value="Argentina">Argentina</option>
          </select>
        </div>

        <select class="form-select" id="empMoneda">
          <option value="CLP">CLP — Peso Chileno</option><option value="PEN">PEN — Sol Peruano</option>
          <option value="MXN">MXN — Peso Mexicano</option><option value="USD">USD — Dólar</option>
        </select>

      <button class="btn btn-primary" onclick="createEmpresa()">Crear Empresa</button>
    </div>

<script>
// ── Estado Global ─────────────────────────────────────────────────────────────
const API = '';
let state = {
  empresa: null, empresas: [], categorias: [], documentos: [],
  currentSection: 'dashboard', processingDoc: null, charts: {}
};

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadEmpresas();
  if (!state.empresas.length) { showOnboarding(); return; }
  state.empresa = state.empresas[0];
  updateSidebarEmpresa();
  await loadCategorias();
  showSection('dashboard');
  checkOllamaStatus();
}

async function loadEmpresas() {
  try { const r = await fetch(`${API}/api/empresas`); const d = await r.json(); state.empresas = d.empresas||[]; } catch(e) { state.empresas=[]; }
}
async function loadCategorias() {
  if (!state.empresa) return;
  try { const r = await fetch(`${API}/api/empresas/${state.empresa.id}/categorias`); const d = await r.json(); state.categorias = d.categorias||[]; } catch(e) { state.categorias=[]; }
}

async function checkOllamaStatus() {
  try {
    const r = await fetch('http://localhost:11434/api/tags', {signal:AbortSignal.timeout(3000)});
    if (r.ok) {
      const d = await r.json();
      const models = (d.models||[]).map(m=>m.name);
      const pref = ['qwen2.5','qwen3','llama3.2','llama3.1','gemma3','phi3','mistral'];
      const found = models.find(m=>pref.some(p=>m.toLowerCase().includes(p)));
      const name = found||models[0]||null;
      document.getElementById('modelName').textContent = name ? name.split(':')[0] : 'Sin modelos';
      document.getElementById('modelDot').className = 'model-dot ' + (name?'online':'');
    }
  } catch(e) { document.getElementById('modelName').textContent='Ollama offline'; }
}

function updateSidebarEmpresa() {
  if (state.empresa) {
    document.getElementById('sidebarEmpName').textContent = state.empresa.razon_social;
    document.getElementById('sidebarEmpRut').textContent = state.empresa.rut||'—';
  }
}

// ── Navegación ────────────────────────────────────────────────────────────────
function showSection(s) {
  state.currentSection = s;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.s===s));
  const titles = {
    dashboard:['Dashboard','Resumen de actividad'],
    'nuevo-gasto':['Nuevo Gasto','Procesa un documento con el pipeline IA'],
    documentos:['Documentos','Gestión y revisión'],
    analitica:['Analítica','Análisis de gastos'],
    recomendaciones:['Recomendaciones','Optimización de gastos'],
    admin:['Administración','Empresas y categorías'],
  };
  const [t,sub] = titles[s]||['',''];
  document.getElementById('topbarTitle').textContent = t;
  document.getElementById('topbarSub').textContent = sub;
  const fns = {dashboard:renderDashboard,'nuevo-gasto':renderNuevoGasto,documentos:renderDocumentos,analitica:renderAnalitica,recomendaciones:renderRecomendaciones,admin:renderAdmin};
  if (fns[s]) fns[s]();
}

// ── Onboarding ────────────────────────────────────────────────────────────────
function showOnboarding() {
  document.getElementById('mainContent').innerHTML = `
    <div class="onboarding">
      <div class="ob-header">
        <div class="ob-icon">📒</div>
        <div class="ob-title">Bienvenido a Ledger AI</div>
        <div class="ob-sub">Tu asistente de contabilidad con IA local.<br>Configura tu empresa en 3 pasos.</div>
      </div>
      <div class="ob-body">
        <div class="ob-dots"><div class="ob-dot active" id="od0"></div><div class="ob-dot" id="od1"></div><div class="ob-dot" id="od2"></div></div>
        <div class="ob-step active" id="os0">
          <div class="ob-counter">Paso 1 de 3 — Datos de la empresa</div>
          <div class="form-group"><label class="form-label">Razón Social *</label><input class="form-input" id="ob_razon" placeholder="Ej: Mi Empresa SpA" autofocus/></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">RUT / RUC</label><input class="form-input" id="ob_rut" placeholder="77.194.706-9"/></div>
            <div class="form-group"><label class="form-label">País</label>
              <select class="form-select" id="ob_pais"><option value="Chile">Chile</option><option value="Peru">Perú</option><option value="Mexico">México</option><option value="Colombia">Colombia</option></select>
            </div>
          </div>
          <div class="form-group"><label class="form-label">Giro / Actividad</label><input class="form-input" id="ob_giro" placeholder="Ej: Venta de Equipos"/></div>
          <div class="form-group"><label class="form-label">Moneda Base</label>
            <select class="form-select" id="ob_moneda"><option value="CLP">CLP — Peso Chileno</option><option value="PEN">PEN — Sol Peruano</option><option value="MXN">MXN — Peso Mexicano</option><option value="USD">USD — Dólar</option></select>
          </div>
          <button class="btn btn-primary btn-lg" style="width:100%" onclick="obNext(0)">Continuar →</button>
        </div>
        <div class="ob-step" id="os1">
          <div class="ob-counter">Paso 2 de 3 — Categorías contables</div>
          <p style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6">El agente usará estas categorías para clasificar tus gastos automáticamente.</p>
          <div id="ob_cats_list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px"></div>
          <div style="display:flex;gap:7px;margin-bottom:14px">
            <input class="form-input" id="ob_new_cat" placeholder="Nueva categoría..." style="flex:1"/>
            <button class="btn btn-secondary btn-sm" onclick="obAddCat()">+ Agregar</button>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" onclick="obBack(1)">← Atrás</button>
            <button class="btn btn-primary btn-lg" style="flex:1" onclick="obNext(1)">Continuar →</button>
          </div>
        </div>
        <div class="ob-step" id="os2">
          <div style="text-align:center;padding:16px 0">
            <div style="font-size:52px;margin-bottom:14px">🎉</div>
            <div style="font-size:17px;font-weight:800;margin-bottom:6px" id="ob_done_name">¡Listo!</div>
            <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:22px">Ya puedes subir tu primer documento y el agente lo procesará automáticamente.</div>
            <button class="btn btn-primary btn-lg" onclick="obFinish()">🚀 Empezar a usar Ledger AI</button>
          </div>
        </div>
      </div>
    </div>
  `;
  window._obCats = ['Operaciones','Marketing','Sueldos','Tecnología','Impuestos','Transporte','Alimentación'];
  renderObCats();
}

function renderObCats() {
  const el = document.getElementById('ob_cats_list'); if (!el) return;
  el.innerHTML = window._obCats.map((c,i)=>`
    <div style="display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px">
      <span style="flex:1;font-size:12px">${c}</span>
      <button onclick="window._obCats.splice(${i},1);renderObCats()" style="background:none;color:var(--text3);font-size:14px;cursor:pointer">✕</button>
    </div>`).join('');
}
function obAddCat() { const v=document.getElementById('ob_new_cat').value.trim(); if(v){window._obCats.push(v);document.getElementById('ob_new_cat').value='';renderObCats();} }
function obBack(step) { document.getElementById(`os${step}`).classList.remove('active'); document.getElementById(`os${step-1}`).classList.add('active'); document.getElementById(`od${step}`).classList.remove('active'); document.getElementById(`od${step-1}`).classList.add('active'); }

async function obNext(step) {
  if (step===0) {
    const razon = document.getElementById('ob_razon').value.trim();
    if (!razon) { showToast('Ingresa la razón social','error'); return; }
    try {
      const r = await fetch(`${API}/api/empresas`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({razon_social:razon,rut:document.getElementById('ob_rut').value.trim()||'00.000.000-0',pais:document.getElementById('ob_pais').value,giro:document.getElementById('ob_giro').value.trim(),moneda_base:document.getElementById('ob_moneda').value})});
      const d = await r.json();
      await loadEmpresas();
      state.empresa = state.empresas.find(e=>e.id===d.id)||state.empresas[0];
      updateSidebarEmpresa();
    } catch(e) { showToast('Error: '+e.message,'error'); return; }
  }
  if (step===1) {
    for (const cat of window._obCats) {
      try { await fetch(`${API}/api/empresas/${state.empresa.id}/categorias`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:cat})}); } catch(e) {}
    }
    await loadCategorias();
    document.getElementById('ob_done_name').textContent = `¡${state.empresa.razon_social} está lista!`;
  }
  document.getElementById(`os${step}`).classList.remove('active');
  document.getElementById(`os${step+1}`).classList.add('active');
  document.getElementById(`od${step}`).classList.replace('active','done');
  document.getElementById(`od${step+1}`).classList.add('active');
}
function obFinish() { checkOllamaStatus(); showSection('nuevo-gasto'); }

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function renderDashboard() {
  if (!state.empresa) { showOnboarding(); return; }
  document.getElementById('mainContent').innerHTML = `
    <div class="kpi-grid" id="kpiGrid">${[1,2,3,4].map(()=>`<div class="kpi-card"><div class="kpi-label">Cargando...</div><div class="kpi-value">—</div></div>`).join('')}</div>
    <div class="charts-grid">
      <div class="chart-card"><div class="card-title">🥧 Gastos por Categoría</div><canvas id="chartCat"></canvas></div>
      <div class="chart-card"><div class="card-title">📈 Tendencia Mensual</div><canvas id="chartTrend"></canvas></div>
    </div>
    <div style="margin-top:18px"><div class="card"><div class="card-title">⚡ Documentos Recientes</div><div id="recentDocs">Cargando...</div></div></div>
  `;
  try {
    const [dash,cats,trend] = await Promise.all([
      fetch(`${API}/api/empresas/${state.empresa.id}/analytics/dashboard`).then(r=>r.json()),
      fetch(`${API}/api/empresas/${state.empresa.id}/analytics/categorias`).then(r=>r.json()),
      fetch(`${API}/api/empresas/${state.empresa.id}/analytics/tendencias`).then(r=>r.json()),
    ]);
    renderKPIs(dash); renderCatChart(cats); renderTrendChart(trend); renderRecentDocs();
  } catch(e) { console.error(e); }
}

function renderKPIs(d) {
  const fmt = n => n ? '$'+Number(n).toLocaleString('es-CL') : '$0';
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Total Gastos (30d)</div><div class="kpi-value" style="color:var(--accent2)">${fmt(d.total_gastos||0)}</div><div class="kpi-sub">${d.total_documentos||0} documentos</div></div>
    <div class="kpi-card"><div class="kpi-label">Pendientes</div><div class="kpi-value" style="color:var(--yellow)">${d.pendientes_revision||0}</div><div class="kpi-sub">Requieren revisión</div></div>
    <div class="kpi-card"><div class="kpi-label">Categorías</div><div class="kpi-value" style="color:var(--green)">${state.categorias.length}</div><div class="kpi-sub">Configuradas</div></div>
    <div class="kpi-card"><div class="kpi-label">Alertas</div><div class="kpi-value" style="color:var(--red)">${d.total_alertas||0}</div><div class="kpi-sub">Anomalías</div></div>
  `;
  const pb = document.getElementById('pendingBadge');
  pb.textContent = d.pendientes_revision||0;
  pb.style.display = (d.pendientes_revision||0)>0?'':'none';
}

function renderCatChart(d) {
  const ctx = document.getElementById('chartCat'); if (!ctx) return;
  const items = d.por_categoria||[];
  if (state.charts.cat) state.charts.cat.destroy();
  state.charts.cat = new Chart(ctx, {type:'doughnut',data:{labels:items.map(i=>i.categoria||'Sin cat'),datasets:[{data:items.map(i=>i.total||0),backgroundColor:['#6c63ff','#22c55e','#f59e0b','#3b82f6','#ef4444','#8b5cf6','#06b6d4','#f97316'],borderWidth:0}]},options:{plugins:{legend:{labels:{color:'#94a3b8',font:{size:10}}}},cutout:'65%'}});
}

function renderTrendChart(d) {
  const ctx = document.getElementById('chartTrend'); if (!ctx) return;
  const items = d.tendencia_mensual||[];
  if (state.charts.trend) state.charts.trend.destroy();
  state.charts.trend = new Chart(ctx, {type:'line',data:{labels:items.map(i=>i.mes||''),datasets:[{label:'Gastos',data:items.map(i=>i.total||0),borderColor:'#6c63ff',backgroundColor:'rgba(108,99,255,.1)',fill:true,tension:0.4,pointBackgroundColor:'#6c63ff'}]},options:{scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1e2535'}},y:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1e2535'}}},plugins:{legend:{display:false}}}});
}

async function renderRecentDocs() {
  const el = document.getElementById('recentDocs'); if (!el||!state.empresa) return;
  try {
    const r = await fetch(`${API}/api/empresas/${state.empresa.id}/documentos?limit=5`);
    const d = await r.json(); const docs = d.documentos||[];
    if (!docs.length) { el.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text3)">No hay documentos. <a href="#" onclick="showSection('nuevo-gasto')" style="color:var(--accent2)">Sube tu primer gasto →</a></div>`; return; }
    el.innerHTML=`<table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:1px solid var(--border)">${['Proveedor','Fecha','Monto','Categoría','Estado'].map(h=>`<th style="text-align:left;padding:7px;font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">${h}</th>`).join('')}</tr></thead><tbody>${docs.map(doc=>`
      <tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="openDocModal('${doc.id}')">
        <td style="padding:9px 7px;font-size:12px">${doc.proveedor||'—'}</td>
        <td style="padding:9px 7px;font-size:11px;color:var(--text2)">${doc.fecha_emision?doc.fecha_emision.split('T')[0]:'—'}</td>
        <td style="padding:9px 7px;font-size:12px;font-weight:700;color:var(--accent2)">${doc.monto_total?'$'+Number(doc.monto_total).toLocaleString('es-CL'):'—'}</td>
        <td style="padding:9px 7px"><span class="doc-cat">${doc.categoria_nombre||'Sin categoría'}</span></td>
        <td style="padding:9px 7px"><span class="badge badge-${doc.estado_revision||'pendiente'}">${statusLabel(doc.estado_revision)}</span></td>
      </tr>`).join('')}</tbody></table>`;
  } catch(e) { el.innerHTML=`<div style="color:var(--text3);font-size:12px">Error cargando documentos</div>`; }
}

// ── Nuevo Gasto — Pipeline Agéntico ──────────────────────────────────────────
const STEPS = [
  {id:'ocr',      icon:'🔍', name:'OCR — Extracción de texto'},
  {id:'vision',   icon:'👁',  name:'Visión IA — Análisis visual'},
  {id:'extraction',icon:'🧠', name:'Extracción de campos'},
  {id:'classification',icon:'🏷',name:'Clasificación del gasto'},
  {id:'audit',    icon:'🛡',  name:'Auditoría y validación'},
  {id:'save',     icon:'💾', name:'Guardando documento'},
];

function renderNuevoGasto() {
  document.getElementById('mainContent').innerHTML = `
    <div style="max-width:780px;margin:0 auto">
      <div class="card" id="uploadCard">
        <div class="card-title">📤 Subir Documento</div>
        <div class="upload-zone" id="uploadZone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.bmp,.tiff,.webp" onchange="onFileSelect(event)"/>
          <div class="upload-icon">☁️</div>
          <div class="upload-title">Arrastra tu documento aquí</div>
          <div class="upload-sub">Facturas, boletas, recibos — PDF, JPG o PNG</div>
          <div style="margin-top:14px">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click();event.stopPropagation()">📂 Seleccionar archivo</button>
          </div>
        </div>
      </div>
      <div class="pipeline-wrap" id="pipelineWrap" style="display:none">
        <div class="pipeline-head">
          <div class="ph-icon">🤖</div>
          <div class="ph-info">
            <div class="ph-title">Pipeline de Procesamiento IA</div>
            <div class="ph-file" id="pipelineFile"></div>
          </div>
          <div class="ph-status" id="pipelineStatus">Iniciando...</div>
        </div>
        <div class="pipeline-steps" id="pipelineSteps"></div>
      </div>
      <div class="result-wrap" id="resultWrap" style="display:none">
        <div class="result-head">
          <span style="font-size:22px">✅</span>
          <div><div style="font-size:14px;font-weight:700">Documento Procesado</div><div style="font-size:11px;color:var(--text2)" id="resultSub">Revisa los datos extraídos</div></div>
        </div>
        <div class="result-body" id="resultBody"></div>
        <div class="result-cat" id="resultCat"></div>
        <div class="result-actions">
          <div class="cat-row">
            <label>Categoría:</label>
            <select id="catSelect" class="form-select"></select>
          </div>
          <button class="btn btn-success btn-lg" onclick="acceptDocument()">✓ Aceptar y Guardar</button>
          <button class="btn btn-secondary" onclick="resetUpload()">↩ Procesar otro</button>
          <button class="btn btn-secondary btn-sm" id="btnVerDoc" onclick="openDocModal(state.processingDoc&&state.processingDoc.doc_id)">👁 Ver doc</button>
        </div>
      </div>
    </div>
  `;
}

function initPipelineUI(filename) {
  document.getElementById('pipelineWrap').style.display='';
  document.getElementById('pipelineFile').textContent = filename;
  document.getElementById('pipelineStatus').textContent = 'Procesando...';
  document.getElementById('pipelineStatus').className = 'ph-status';
  document.getElementById('resultWrap').style.display='none';
  const stepsEl = document.getElementById('pipelineSteps');
  stepsEl.innerHTML = STEPS.map((s,i)=>`
    <div class="p-step" id="pstep_${s.id}">
      <div class="p-step-left">
        <div class="p-step-num waiting" id="pnum_${s.id}">${s.icon}</div>
        ${i<STEPS.length-1?`<div class="p-step-line" id="pline_${s.id}"></div>`:''}
      </div>
      <div class="p-step-right">
        <div class="p-step-name">${s.name}</div>
        <div class="p-step-msg" id="pmsg_${s.id}">Esperando...</div>
        <div id="pdata_${s.id}"></div>
      </div>
    </div>
  `).join('');
}

function updateStep(stepId, status, data) {
  const num = document.getElementById(`pnum_${stepId}`);
  const msg = document.getElementById(`pmsg_${stepId}`);
  const dataEl = document.getElementById(`pdata_${stepId}`);
  if (!num) return;
  const step = STEPS.find(s=>s.id===stepId);
  num.className = `p-step-num ${status}`;
  if (status==='running') {
    num.innerHTML = `<div class="spinner" style="width:14px;height:14px;border-width:2px"></div>`;
  } else {
    num.textContent = step?.icon || '•';
  }
  msg.className = `p-step-msg ${status}`;
  const statusMsgs = {waiting:'Esperando...',running:'Procesando...',done:'Completado',error:'Error',skip:'Omitido'};
  msg.textContent = data?.message || statusMsgs[status] || '';

  // Mark previous line as done
  if (status==='done'||status==='running') {
    const prevIdx = STEPS.findIndex(s=>s.id===stepId);
    if (prevIdx>0) {
      const prevLine = document.getElementById(`pline_${STEPS[prevIdx-1].id}`);
      if (prevLine) prevLine.classList.add('done');
    }
  }

  let extra = '';
  if ((status==='done'||status==='info') && data) {
    if (data.fields && Object.keys(data.fields).filter(k=>data.fields[k]).length>0) {
      const items = Object.entries(data.fields).filter(([k,v])=>v!=null&&v!='').slice(0,8)
        .map(([k,v])=>`<div class="p-field"><span class="pk">${fieldLabel(k)}:</span><span class="pv">${v}</span></div>`).join('');
      if (items) extra += `<div class="p-step-fields">${items}</div>`;
    }
    if (data.preview) {
      extra += `<div class="p-step-preview"><pre>${escHtml(data.preview.substring(0,400))}</pre></div>`;
    }
    if (data.categoria_sugerida) {
      const conf = Math.round((data.confianza||0)*100);
      const cls = conf>=70?'high':conf>=40?'med':'low';
      extra += `<div class="p-cat-suggest">
        <div class="p-cat-name">🏷 ${data.categoria_sugerida}</div>
        <div class="p-cat-reason">${data.razon||''}</div>
        <div class="p-conf-bar"><div class="p-conf-fill ${cls}" style="width:${conf}%"></div></div>
        <div class="p-conf-label">Confianza: ${conf}%</div>
      </div>`;
    }
    if (data.excepciones && data.excepciones.length>0) {
      extra += `<div class="p-step-preview" style="border-color:var(--yellow)">
        ${data.excepciones.map(e=>`<div>⚠️ ${e.mensaje||e}</div>`).join('')}
      </div>`;
    }
  }
  dataEl.innerHTML = extra;
  document.getElementById(`pstep_${stepId}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function processFile(file) {
  if (!state.empresa) { showToast('Selecciona una empresa primero','error'); return; }
  initPipelineUI(file.name);

  // Upload file first
  const formData = new FormData();
  formData.append('file', file);
  let uploadData;
  try {
    const r = await fetch(`${API}/api/empresas/${state.empresa.id}/documentos/upload`, {method:'POST',body:formData});
    if (!r.ok) throw new Error(await r.text());
    uploadData = await r.json();
  } catch(e) {
    showToast('Error subiendo archivo: '+e.message,'error');
    document.getElementById('pipelineStatus').textContent='Error al subir';
    document.getElementById('pipelineStatus').className='ph-status error';
    return;
  }

  // Connect SSE stream for pipeline
  const params = new URLSearchParams({file_path:uploadData.file_path, original_filename:uploadData.original_filename||file.name});
  const evtSource = new EventSource(`${API}/api/empresas/${state.empresa.id}/documentos/process-stream?${params}`);
  let finalData = null;

  evtSource.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.step==='complete' && data.status==='done') {
        finalData = data;
        state.processingDoc = data;
        evtSource.close();
        document.getElementById('pipelineStatus').textContent='✅ Completado';
        document.getElementById('pipelineStatus').className='ph-status done';
        renderResultPanel(data);
        showToast('Documento procesado exitosamente','success');
        return;
      }
      if (data.step==='error') {
        evtSource.close();
        document.getElementById('pipelineStatus').textContent='❌ Error';
        document.getElementById('pipelineStatus').className='ph-status error';
        showToast(data.message||'Error en el pipeline','error');
        return;
      }
      if (STEPS.find(s=>s.id===data.step)) updateStep(data.step, data.status, data);
    } catch(e) { console.error('SSE parse error:',e); }
  };
  evtSource.onerror = () => { if (!finalData) { evtSource.close(); showToast('Error de conexión con el pipeline','error'); } };
}

let _docFilter='all';
function setDocFilter(f) { _docFilter=f; document.querySelectorAll('.filter-tab').forEach(el=>el.classList.toggle('active',el.dataset.f===f)); filterDocs(); }
function filterDocs() {
  const q=(document.getElementById('docSearch')?.value||'').toLowerCase();

  if (_docFilter!=='all') docs=docs.filter(d=>d.estado_revision===_docFilter);
  if (q) docs=docs.filter(d=>(d.proveedor||'').toLowerCase().includes(q)||(d.folio||'').toLowerCase().includes(q)||(d.categoria_nombre||'').toLowerCase().includes(q));

        <div class="card-title">🏢 Empresas <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openModal('empresaModal')">+ Nueva</button></div>
        <div id="adminEmpresas">Cargando...</div>
      </div>
      <div class="card">
        <div class="card-title">🏷 Categorías <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="addCategory()">+ Agregar</button></div>
        <div id="adminCats">Cargando...</div>
      </div>
    </div>
  `;
  document.getElementById('adminEmpresas').innerHTML=state.empresas.map(e=>`
    <div style="display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--bg3);border:1px solid ${state.empresa?.id===e.id?'var(--accent)':'var(--border)'};border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer" onclick="selectEmpresa('${e.id}')">
      <div style="flex:1"><div style="font-size:12px;font-weight:700">${e.razon_social}</div><div style="font-size:10px;color:var(--text3)">${e.rut||'—'} · ${e.pais||'—'}</div></div>
      ${state.empresa?.id===e.id?'<span style="color:var(--green);font-size:10px;font-weight:700">✓ Activa</span>':''}
    </div>`).join('')||'<div style="color:var(--text3);font-size:12px">Sin empresas</div>';
  document.getElementById('adminCats').innerHTML=state.categorias.map(c=>`
    <div style="display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px">
      <span style="font-size:12px;flex:1">${c.nombre}</span>
      <span style="font-size:9px;color:var(--text3)">${c.tipo_gasto||'gasto'}</span>
    </div>`).join('')||'<div style="color:var(--text3);font-size:12px">Sin categorías</div>';
}

async function selectEmpresa(id) {
  state.empresa=state.empresas.find(e=>e.id===id);
  updateSidebarEmpresa();
  await loadCategorias();
  renderAdmin();
  showToast(`Empresa activa: ${state.empresa.razon_social}`,'info');
}

async function createEmpresa() {
  const razon=document.getElementById('empRazonSocial').value.trim();
  if (!razon) { showToast('Ingresa la razón social','error'); return; }
  try {
    const r=await fetch(`${API}/api/empresas`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({razon_social:razon,rut:document.getElementById('empRut').value.trim()||'00.000.000-0',pais:document.getElementById('empPais').value,giro:document.getElementById('empGiro').value.trim(),moneda_base:document.getElementById('empMoneda').value})});
    const d=await r.json();
    await loadEmpresas();
    state.empresa=state.empresas.find(e=>e.id===d.id)||state.empresas[0];
    updateSidebarEmpresa();
    await loadCategorias();
    closeModal('empresaModal');
    showToast('Empresa creada','success');
    renderAdmin();
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

async function addCategory() {
  const nombre=prompt('Nombre de la categoría:');
  if (!nombre||!state.empresa) return;
  try {
    await fetch(`${API}/api/empresas/${state.empresa.id}/categorias`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:nombre.trim()})});
    await loadCategorias();
    showToast('Categoría creada','success');
    renderAdmin();
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

// ── Exportar ──────────────────────────────────────────────────────────────────
async function exportData() {
  if (!state.empresa) return;
  try {
    const r=await fetch(`${API}/api/empresas/${state.empresa.id}/export/csv`,{method:'POST'});
    const d=await r.json();
    if (d.filename) { window.open(`${API}/api/exports/${d.filename}`,'_blank'); showToast('CSV generado','success'); }
  } catch(e) { showToast('Error exportando: '+e.message,'error'); }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg, type='info') {
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span>${{success:'✓',error:'✕',info:'ℹ'}[type]||'ℹ'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>t.remove(),4000);
}
function statusLabel(s) { return {pendiente:'Pendiente',revisado:'Aprobado',rechazado:'Rechazado'}[s]||s||'Pendiente'; }
function fieldLabel(k) { return {proveedor:'Proveedor',rut_proveedor:'RUT',fecha_emision:'Fecha',folio:'Folio',monto_neto:'Neto',iva:'IVA',monto_total:'Total',tipo_documento:'Tipo',moneda:'Moneda',descripcion:'Descripción'}[k]||k; }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('click',e=>{ if(e.target.classList.contains('modal-overlay')) e.target.classList.remove('open'); });

init();
</script>
</body>
</html>
